<script>
(function() {
  // Function to set or update viewport meta tag
  function ensureViewportMeta() {
    var viewportMeta = document.querySelector('meta[name="viewport"]');
    
    if (!viewportMeta) {
      // Create viewport meta tag if it doesn't exist
      viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      document.head.insertBefore(viewportMeta, document.head.firstChild);
    }
    
    // Set viewport to prevent iOS auto-zoom
    // width=device-width: Use device width
    // initial-scale=1.0: Initial zoom level
    // maximum-scale=1.0: Prevent zooming beyond 1.0
    // user-scalable=no: Disable user scaling (prevents pinch zoom and auto-zoom on input focus)
    viewportMeta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
  }
  
  // Run immediately if DOM is already ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureViewportMeta);
  } else {
    ensureViewportMeta();
  }
  
  // Also ensure it's set when head is ready (in case script runs before head)
  if (!document.head) {
    var observer = new MutationObserver(function(mutations) {
      if (document.head) {
        ensureViewportMeta();
        observer.disconnect();
      }
    });
    observer.observe(document.documentElement, { childList: true });
  }
})();
</script>

<script>
(function() {
  var originalAddEventListener = EventTarget.prototype.addEventListener;
  var originalRemoveEventListener = EventTarget.prototype.removeEventListener;

  // ── Tap vs Swipe detection ──
  // Track pointerdown position; only synthesize click when displacement is small.
  var ptrDownPos = null;
  var TAP_THRESHOLD_SQ = 100; // 10px squared

  originalAddEventListener.call(document, 'pointerdown', function(e) {
    if (e.button !== 0) return;
    ptrDownPos = { x: e.clientX, y: e.clientY };
  }, { capture: true, passive: true });

  function isTap(e) {
    if (!ptrDownPos) return true; // no pointerdown recorded — be safe, treat as tap
    var dx = e.clientX - ptrDownPos.x;
    var dy = e.clientY - ptrDownPos.y;
    return (dx * dx + dy * dy) <= TAP_THRESHOLD_SQ;
  }

  // ── click → pointerup conversion ──
  var listenerMap = new WeakMap();

  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (type === 'click' && typeof listener === 'function') {
      var elementMap = listenerMap.get(this);
      if (!elementMap) {
        elementMap = new Map();
        listenerMap.set(this, elementMap);
      }

      var existingPointerListener = elementMap.get(listener);
      if (existingPointerListener) {
        return originalAddEventListener.call(this, 'pointerup', existingPointerListener, options);
      }

      var pointerupListener = function(e) {
        if (e.button !== 0) return;
        if (!isTap(e)) return;

        var clickEvent = new MouseEvent('click', {
          bubbles: e.bubbles, cancelable: e.cancelable, view: e.view,
          detail: 1,
          screenX: e.screenX, screenY: e.screenY,
          clientX: e.clientX, clientY: e.clientY,
          ctrlKey: e.ctrlKey, altKey: e.altKey,
          shiftKey: e.shiftKey, metaKey: e.metaKey,
          button: e.button, relatedTarget: e.relatedTarget
        });

        Object.defineProperty(clickEvent, 'currentTarget', { value: e.currentTarget, enumerable: true });

      };

      elementMap.set(listener, pointerupListener);
      return originalAddEventListener.call(this, 'pointerup', pointerupListener, options);
    }

    return originalAddEventListener.call(this, type, listener, options);
  };

    if (type === 'click' && typeof listener === 'function') {
      var elementMap = listenerMap.get(this);
      if (elementMap) {
        var pointerupListener = elementMap.get(listener);
        if (pointerupListener) {
          elementMap.delete(listener);
          return originalRemoveEventListener.call(this, 'pointerup', pointerupListener, options);
        }
      }
    }
    return originalRemoveEventListener.call(this, type, listener, options);
  };

  // ── Synthetic click for .onclick compatibility ──
  // Only dispatch when the gesture is a tap (not a swipe).
  var SEKAI_SYNTHETIC_KEY = '__sekai_sc';

  originalAddEventListener.call(document, 'pointerup', function(e) {
    if (e.button !== 0) return;
    if (!isTap(e)) return;
    var t = e.target;
    if (!t || !t.dispatchEvent) return;

    var evt = new MouseEvent('click', {
      bubbles: true, cancelable: true, view: e.view,
      detail: 1,
      screenX: e.screenX, screenY: e.screenY,
      clientX: e.clientX, clientY: e.clientY,
      ctrlKey: e.ctrlKey, altKey: e.altKey,
      shiftKey: e.shiftKey, metaKey: e.metaKey,
      button: 0, relatedTarget: null
    });
    Object.defineProperty(evt, SEKAI_SYNTHETIC_KEY, { value: true });
    t.dispatchEvent(evt);
  }, false);

  // Block browser-synthesized click events to prevent double-triggering.
  originalAddEventListener.call(document, 'click', function(e) {
    if (!e[SEKAI_SYNTHETIC_KEY]) {
      e.stopImmediatePropagation();
    }
  }, true);
})();

<script>
(function() {
  // Track recent touch to block emulated mouse events
  var lastTouchTime = 0;
  var TOUCH_MOUSE_DELAY = 200; // ms to block mouse events after touch

  // Global touch tracker - set flag when touch occurs
  document.addEventListener('touchstart', function() {
    lastTouchTime = Date.now();
  }, { passive: true, capture: true });

  document.addEventListener('touchend', function() {
    lastTouchTime = Date.now();
  }, { passive: true, capture: true });

  // Block emulated mouse events that follow touch
  // BUT allow them on focusable elements (inputs need mousedown for focus)
  function blockEmulatedMouseHandler(e) {
    if (Date.now() - lastTouchTime < TOUCH_MOUSE_DELAY) {
      // Don't block on focusable elements - they need mousedown for focus
      var target = e.target;
      if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
        return; // Allow the event
      }
      e.stopPropagation();
      // NOTE: Do NOT call preventDefault() here.
      // CSS user-select:none already handles text selection prevention.
      // On iOS WKWebView, mousedown.preventDefault() can intermittently
      // suppress click event synthesis, breaking .onclick handlers.
    }
  }

  // Capture phase blockers for emulated mouse events
  document.addEventListener('mousedown', blockEmulatedMouseHandler, { capture: true });

  // Patch addEventListener to force passive on touch events.
  // Expose original globally so SCROLL_BLOCK_SCRIPT can register a
  // non-passive touchmove handler to block iOS WKWebView parent scroll.
  var originalAddEventListener = EventTarget.prototype.addEventListener;
  window.__sekai_orig_ael = originalAddEventListener;

  EventTarget.prototype.addEventListener = function(type, listener, options) {
    // Convert touchstart/touchmove to passive
    // Mouse event emulation is handled by our global blockers above
    if (type === 'touchstart' || type === 'touchmove') {
      var newOptions = Object.assign({}, options || {}, { passive: true });
      return originalAddEventListener.call(this, type, listener, newOptions);
    }
    return originalAddEventListener.call(this, type, listener, options);
  };
})();
</script>

<script>
(function() {
  // Track if dom_ready was already sent
  var domReadySent = false;

  function sendDomReady() {
    if (domReadySent) return;
    domReadySent = true;
    window.parent.postMessage({ type: 'sekai_iframe_dom_ready' }, '*');
  }

  // Send dom_ready when DOMContentLoaded fires
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', sendDomReady);
  } else {
    // DOM already loaded
    sendDomReady();
  }

  // Helper to serialize message - handles objects that would become [object Object]
  function serializeMessage(msg) {
    if (msg === null || msg === undefined) return '';
    if (typeof msg === 'string') return msg;
    if (typeof msg === 'object') {
      try {
        return JSON.stringify(msg);
      } catch (e) {
        return String(msg);
      }
    }
    return String(msg);
  }

  // Catch JS errors and send to parent
  window.onerror = function(message, source, lineno, colno, error) {
    window.parent.postMessage({
      type: 'sekai_iframe_js_error',
      message: serializeMessage(message),
      source: source || '',
      lineno: lineno || 0,
      colno: colno || 0,
      errorName: error ? error.name : '',
      errorStack: error ? error.stack : ''
    }, '*');
    // Return false to allow default error handling
    return false;
  };

  // Also catch unhandled promise rejections
  window.addEventListener('unhandledrejection', function(event) {
    var reason = event.reason;
    var isError = reason instanceof Error;
    window.parent.postMessage({
      type: 'sekai_iframe_js_error',
      message: reason ? serializeMessage(reason) : 'Unhandled promise rejection',
      source: 'unhandledrejection',
      lineno: 0,
      colno: 0,
      errorName: isError ? reason.name : '',
      errorStack: isError ? reason.stack : ''
    }, '*');
  });
})();
</script>

<script>
(function() {
  // Collect all devicemotion listeners registered by game code
  var deviceMotionListeners = [];

  // Save original addEventListener
  var originalAddEventListener = window.addEventListener;

  // Intercept addEventListener to capture devicemotion listeners
  window.addEventListener = function(type, listener, options) {
    if (type === 'devicemotion' && typeof listener === 'function') {
      deviceMotionListeners.push(listener);
      // Also add to native in case permission is granted elsewhere
      return originalAddEventListener.call(this, type, listener, options);
    }
    return originalAddEventListener.call(this, type, listener, options);
  };

  // Also intercept removeEventListener
  var originalRemoveEventListener = window.removeEventListener;
  window.removeEventListener = function(type, listener, options) {
    if (type === 'devicemotion' && typeof listener === 'function') {
      var index = deviceMotionListeners.indexOf(listener);
      if (index !== -1) {
        deviceMotionListeners.splice(index, 1);
      }
    }
    return originalRemoveEventListener.call(this, type, listener, options);
  };

  // Listen for forwarded motion data from parent
  window.addEventListener('message', function(event) {
    if (!event.data || event.data.type !== '__sekai_device_motion__') return;

    var data = event.data;

    // Create a synthetic event-like object
    var syntheticEvent = {
      accelerationIncludingGravity: data.accelerationIncludingGravity,
      acceleration: data.acceleration,
      rotationRate: data.rotationRate,
      interval: data.interval || 16,
      // Make it look like a real event
      type: 'devicemotion',
      timeStamp: data.timestamp || Date.now(),
      target: window,
      currentTarget: window,
      preventDefault: function() {},
      stopPropagation: function() {},
      stopImmediatePropagation: function() {}
    };

    // Trigger all registered listeners
    deviceMotionListeners.forEach(function(listener) {
      try {
        listener(syntheticEvent);
      } catch (e) {
        // Ignore listener errors
      }
    });
  });
})();
</script>

<script>
(function() {
  // Track all AudioContexts created in this iframe
  var audioContexts = [];
  var originalAudioContext = window.AudioContext || window.webkitAudioContext;

  if (originalAudioContext) {
    // Patch AudioContext constructor to track instances and enforce initial mute state.

    // AudioNode sources cannot produce audio before the parent sends receive_audio_mute.
    // This closes the race window between iframe load start and the first mute message.
    var PatchedAudioContext = function() {
      var ctx = new originalAudioContext();
      audioContexts.push(ctx);
      // Per-ctx diagnostic flags. Each AudioContext instance warns at most
      // once for each of the two diagnostics below, so a rAF-driven
      // resume() loop (observed in real games) does not spam vconsole,
      // while new contexts still act as fresh sentinels.
      var resumeBlockWarned = false;
      var browserResumeWarned = false;
      if (typeof ctx.resume === 'function') {
        var originalCtxResume = ctx.resume.bind(ctx);
        ctx.resume = function() {
          if (isMuted) {

            // Blocked here prevents the audibility observer from reporting a
            // false playing_started. Logged once per ctx to confirm the
            // "game code calls resume()" leak path is real.
            if (!resumeBlockWarned) {
              resumeBlockWarned = true;
              try {
                console.warn(
                  '[sekai-iframe-audio] AudioContext.resume() blocked while muted (once per ctx)'
                );
              } catch (e) {}
            }
            return Promise.resolve();
          }
          return originalCtxResume();
        };

      if (isMuted) {
        ctx.suspend().catch(function() {});
      }

      // transitions between suspended/running/closed. ctx.suspend()/resume()
      // resolve asynchronously, so the statechange event is the only reliable
      // signal that the context has actually moved.
      try {
        ctx.addEventListener('statechange', function() {
          // Sentinel: resume() is blocked above while muted, so if the ctx
          // still enters 'running' during mute, the only remaining cause is
          // browser-initiated state recovery (e.g. iOS audio session
          // interruption ending). If this log ever appears in practice, the
          // resume() block alone is not enough — we must also guard
          // notifyAudibilityChange() to suppress audible=true while muted.
          // Logged once per ctx to avoid repeated warnings on oscillating
          // state transitions.

            browserResumeWarned = true;
            try {

                '[sekai-iframe-audio] AudioContext entered running while muted (browser-initiated, once per ctx)'
              );

      }

    window.AudioContext = PatchedAudioContext;
    if (window.webkitAudioContext) {

  var originalAudio = window.Audio;

    window.Audio = function(src) {

          rememberMutedState(element);
          try { element.muted = true; } catch (e) {}
        }

        videoElements.push(element);
        if (isMuted) {
          rememberMutedState(element);
          try { element.muted = true; } catch (e) {}
        }

  };

  // Track elements that are INTENDED to be playing (based on .play()/.pause() calls).
  // This is more reliable than checking .paused at mute time, because iOS pauses
  // audio elements when the app goes to background BEFORE our JS visibility handler
  // runs — by the time muteAllAudio() is called, all elements are already paused
  // by the OS and .paused === true for all of them.
  var intendedPlaying = new Set();

  if (window.HTMLMediaElement) {
    var originalHTMLPlay = HTMLMediaElement.prototype.play;
    var originalHTMLPause = HTMLMediaElement.prototype.pause;
    var internalPause = false;

    HTMLMediaElement.prototype.play = function() {

            internalPause = true;
            originalHTMLPause.call(this);

      seen.add(el);
      elements.push(el);

      if (ctx && ctx.state === 'running') {
        ctx.suspend().catch(function() {});

    // Pause first, then force mute so background playback cannot leak audio.
    // The audibility observer below will automatically emit
    // sekai_iframe_audio_playing_stopped once the pause/mute propagates, so
    // we no longer post a separate sekai_iframe_audio_muted confirmation.
    collectTrackedMediaElements().forEach(function(el) {
      try {
        lockElementAudio(el);
      } catch (e) {

      }

  function resumeAllContexts() {
    audioContexts.forEach(function(ctx) {

      // Reason: muteAllAudio() calls ctx.suspend(), which is async. If
      // unmuteAllAudio() (or a touchstart retry) runs before suspend() resolves,
      // ctx.state is still 'running' — the old suspended/interrupted-only guard
      // would skip it, then suspend() resolves and the context stays permanently
      // suspended. By calling resume() on 'running' contexts too, we queue a
      // resume after the pending suspend, so both operations execute in order
      // (suspend → resume) and the context ends up running as intended.
      // resume() on an already-running context is a no-op per the Web Audio spec.
      if (ctx && ctx.state !== 'closed') {
        ctx.resume().catch(function() {});
      }

    if (!isMuted) return;
    isMuted = false;

    // Resume all AudioContexts immediately (handles 'suspended' and 'interrupted')

    // Restore tracked media elements to their original muted state.
    collectTrackedMediaElements().forEach(function(el) {
      var wasMuted = mutedElements.get(el);
      if (wasMuted !== undefined) {
        el.muted = wasMuted;
      } else {

      }

    // Queue intended elements for playback resume.
    // iOS pauses audio/video elements on app-switch before our JS handler runs,
    // so simply unmuting is not enough — we must call .play() to restore.
    // We populate pendingResume here; the persistent touchstart listener below
    // retries on every user touch until all elements are playing again.
    pendingResume = [];
    intendedPlaying.forEach(function(el) {
      if (!el || el.ended) return;
      pendingResume.push(el);

    // that allow .play() without a fresh user gesture.
    pendingResume.forEach(function(el) {
      try { if (el.paused) el.play().catch(function() {}); } catch(e) {}

  // Registered once at script init using capture phase so game code stopPropagation
  // cannot prevent it from running.

    if (pendingResume.length === 0) return;
    var toTry = pendingResume;
    pendingResume = [];
    toTry.forEach(function(el) {

    var elements = [];

  //

  //   - "played after it shouldn't" — audio duration > card visible duration
  // Both failure modes are invisible from the parent side alone.

(function() {
  var ORIGIN = 'sekai_gaming_iframe_api';

  // --- Shared helper: find <audio> elements by URL and set volume ---
  function applyVolumeByUrl(url, volume) {
    if (!url) return;
    var vol = Math.max(0, Math.min(1, Number(volume)));
    if (isNaN(vol)) return;
    document.querySelectorAll('audio').forEach(function(el) {
      var src = el.src || el.currentSrc || '';
      if (src === url) {
        el.volume = vol;
      }
    });
  }

  // Reads window.sekaiEditable (written into the HTML by the backend) and applies
  // any volume values to matching <audio> elements. The LLM-generated game code
  // does not read the volume field, so we apply it here.
  function applyInitialVolumes() {
    var meta = window.sekaiEditable;
    if (!meta) return;
    var items = (meta.music || []).concat(meta.sfx || []);
    items.forEach(function(item) {
      if (item.value && item.volume !== undefined && item.volume !== null) {
        applyVolumeByUrl(item.value, item.volume);
      }
    });

  // audio elements created during game initialization (e.g. after DOMContentLoaded).
  if (document.readyState !== 'loading') {
    applyInitialVolumes();
  } else {
    document.addEventListener('DOMContentLoaded', applyInitialVolumes);
  }
  setTimeout(applyInitialVolumes, 500);
  setTimeout(applyInitialVolumes, 1500);

  // --- Real-time volume control (postMessage from editor) ---
  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data || data.origin !== ORIGIN) return;

    var payload = data.data;
    if (!payload) return;

    if (data.type === 'set_audio_volume') {
      // Real-time drag path: LLM code never sees this type
      applyVolumeByUrl(payload.url, payload.volume);
    } else if (data.type === 'apply_change' && payload.volume !== undefined && payload.volume !== null) {
      // Commit path (on release): runs before LLM handler via capture phase
      applyVolumeByUrl(payload.value, payload.volume);
    }
  }, true); // capture phase — runs before LLM game code
})();

(function() {
  var ORIGIN = 'sekai_gaming_iframe_api';

  // Handle the font data URL response from the parent window.
  // The parent fetched the font bytes and encoded them as a base64 data URL
  // so we can inject @font-face without any cross-origin network request.

    var prevStyle = document.getElementById('sekai-font-' + msg.itemId);
    if (prevStyle) prevStyle.parentNode.removeChild(prevStyle);

    var style = document.createElement('style');
    style.id = 'sekai-font-' + msg.itemId;
    // font-weight range covers all weights so we don't need per-weight rules.
    style.textContent = "@font-face { font-family: '" + msg.family + "'; src: url('" + msg.dataUrl + "'); font-weight: 100 900; }";
    document.head.appendChild(style);

    if (msg.cssVar) {
      document.documentElement.style.setProperty(msg.cssVar, "'" + msg.family + "'");
    }
  });

  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data || data.origin !== ORIGIN) return;
    if (data.type !== 'apply_change') return;

    if (!payload || !payload.value) return;

    var meta = window.sekaiEditable;
    if (!meta) return;

    // --- Font handling ---
    // No type guard — LLM-generated sekaiEditable often omits the type field.
    if (meta.fonts) {
      for (var i = 0; i < meta.fonts.length; i++) {
        var font = meta.fonts[i];
        if (font.id === payload.id) {

          font.value = payload.value;

          // Ask the parent to fetch and return the font as a data URL.
          // Avoids WKWebView blob-iframe CORS restrictions on external font fetches.
          window.parent.postMessage({
            type: 'sekai_request_font_data',
            itemId: font.id,
            fontUrl: payload.value,
            family: font.fallback || ('sekai-swap-' + font.id),
            cssVar: font.cssVar || null,
          }, '*');
          return;
        }
      }
    }

    if (meta.models) {

        var model = meta.models[j];

          model.value = payload.value;
          if (payload.name) model.name = payload.name;
          return;
        }
      }

  var DEBOUNCE_MS = 500; // Prevent multiple events from single swipe

(function() {

  function urlToBase64(url) {
    return fetch(url)
      .then(function(res) { return res.blob(); })
      .then(function(blob) {
        return new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.readAsDataURL(blob);
        });

      .catch(function() { return null; });
  }

  function inlineImages(doc) {
    var imgs = Array.prototype.slice.call(doc.querySelectorAll('img[src]'));
    return Promise.all(imgs.map(function(img) {
      return urlToBase64(img.src).then(function(base64) {
        if (base64) img.setAttribute('src', base64);
      });
    }));
  }

  function inlineCssUrls(css, baseUrl) {
    var urlPattern = /url(s*([^)]+)s*)/g;
    var matches = [];
    var match;
    while ((match = urlPattern.exec(css)) !== null) {
      var url = match[1].trim().replace(/^['"]|['"]$/g, '');
      if (!url.startsWith('data:') && !url.startsWith('#')) {
        matches.push({ full: match[0], url: url });
      }
    }
    if (matches.length === 0) return Promise.resolve(css);

    return Promise.all(matches.map(function(m) {
      var resolved;
      try { resolved = new URL(m.url, baseUrl).href; } catch(e) { return Promise.resolve(null); }
      return urlToBase64(resolved).then(function(base64) {
        return base64 ? { original: m.full, replacement: 'url(' + base64 + ')' } : null;
      });
    })).then(function(results) {
      results.forEach(function(r) {
        if (r) css = css.split(r.original).join(r.replacement);
      });
      return css;
    });
  }

  function inlineStylesheets(doc) {
    var links = Array.prototype.slice.call(doc.querySelectorAll('link[rel="stylesheet"]'));
    return Promise.all(links.map(function(link) {
      var href = link.href;
      return fetch(href)
        .then(function(res) { return res.text(); })
        .then(function(css) { return inlineCssUrls(css, href); })
        .then(function(css) {
          var style = doc.createElement('style');
          style.textContent = css;
          link.parentNode.replaceChild(style, link);

        .catch(function() {});
    }));
  }

    var cloned = document.documentElement.cloneNode(true);
    var tempDoc = document.implementation.createHTMLDocument('');

    var scripts = Array.prototype.slice.call(tempDoc.querySelectorAll('script'));

            } else {
                ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,256,256);
                ctx.fillStyle = '#111';
                for(let i=0; i<1000; i++) {
                    ctx.fillRect(Math.random()*256, Math.random()*256, 4, 4);
                }
            }
            const tex = new THREE.CanvasTexture(cvs);
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
            tex.magFilter = THREE.NearestFilter; // retro look
            return tex;
        }

        function getTexture(type, id) {
            const url = getConfig('images', id);
            if (url) {
                const tex = new THREE.TextureLoader().load(url);
                tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
                return tex;
            }
            return createProceduralTexture(type);
        }

        function updateDynamicWalls(force = false) {
            const px = Math.round(playerGroup.position.x);
            const pz = Math.round(playerGroup.position.z);

            if (!force && px === lastPlayerGridX && pz === lastPlayerGridZ) return;

            lastPlayerGridX = px;
            lastPlayerGridZ = pz;

            if (wallMesh) scene.remove(wallMesh);

            const walls = [];
            for (let z = pz - VIEW_RADIUS; z <= pz + VIEW_RADIUS; z++) {
                for (let x = px - VIEW_RADIUS; x <= px + VIEW_RADIUS; x++) {
                    if (getCell(x, z) === 'W') {
                        walls.push({ x, z });
                    }
                }
            }

            const wallTex = getTexture('wall', 'texWall');
            const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 0.9, metalness: 0.15 });
            const boxGeo = new THREE.BoxGeometry(TILE_SIZE, TILE_SIZE, TILE_SIZE);
            
            wallMesh = new THREE.InstancedMesh(boxGeo, wallMat, walls.length);
            const dummy = new THREE.Object3D();
            
            walls.forEach((w, idx) => {
                dummy.position.set(w.x * TILE_SIZE, TILE_SIZE/2, w.z * TILE_SIZE);
                dummy.updateMatrix();
                wallMesh.setMatrixAt(idx, dummy.matrix);
            });
            
            scene.add(wallMesh);

            // Move floor & ceiling relative to player grid block
            if (floorMesh) {
                floorMesh.position.set(px, 0, pz);
                if (floorTex) {
                    floorTex.offset.set(px / (VIEW_RADIUS * 3), pz / (VIEW_RADIUS * 3));
                }
            }
            if (ceilingMesh) {
                ceilingMesh.position.set(px, TILE_SIZE, pz);
            }
        }

        function buildLevel() {
            floorTex = getTexture('floor', 'texFloor');
            floorTex.repeat.set(VIEW_RADIUS * 3, VIEW_RADIUS * 3);
            
            const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.9 });
            const ceilMat = new THREE.MeshStandardMaterial({ color: 0x010101, roughness: 1.0 });

            const floorPlane = new THREE.PlaneGeometry(VIEW_RADIUS * 3, VIEW_RADIUS * 3);
            floorMesh = new THREE.Mesh(floorPlane, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set(0, 0, 0);
            scene.add(floorMesh);

            const ceilPlane = new THREE.PlaneGeometry(VIEW_RADIUS * 3, VIEW_RADIUS * 3);
            ceilingMesh = new THREE.Mesh(ceilPlane, ceilMat);
            ceilingMesh.rotation.x = Math.PI / 2;
            ceilingMesh.position.set(0, TILE_SIZE, 0);
            scene.add(ceilingMesh);

            playerGroup.position.set(0, 0, 0);
            updateDynamicWalls(true);
        }

        function onWindowResize() {
            const canvas = renderer.domElement;
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        }

        // ==========================================
        // INPUT CONTROLS
        // ==========================================
        let moveTouchId = null;
        let lookTouchId = null;
        let moveOrigin = { x: 0, y: 0 };
        let lookLast = { x: 0, y: 0 };
        let moveVector = { x: 0, y: 0 };
        
        let yaw = 0;
        let pitch = 0;

        function initControls() {
            const zMove = document.getElementById('zone-move');
            const zLook = document.getElementById('zone-look');
            const joyBase = document.getElementById('joystick-base');
            const joyNub = document.getElementById('joystick-nub');

            zMove.addEventListener('pointerdown', e => {
                if(moveTouchId !== null) return;
                moveTouchId = e.pointerId;
                moveOrigin = { x: e.clientX, y: e.clientY };
                
                joyBase.style.left = e.clientX + 'px';
                joyBase.style.top = e.clientY + 'px';
                joyNub.style.left = e.clientX + 'px';
                joyNub.style.top = e.clientY + 'px';
                joyBase.style.display = 'block';
                joyNub.style.display = 'block';
                
                zMove.setPointerCapture(e.pointerId);
            });

            zMove.addEventListener('pointermove', e => {
                if(e.pointerId !== moveTouchId) return;
                let dx = e.clientX - moveOrigin.x;
                let dy = e.clientY - moveOrigin.y;
                const maxDist = 40;
                const dist = Math.hypot(dx, dy);
                if (dist > maxDist) {
                    dx = (dx/dist) * maxDist;
                    dy = (dy/dist) * maxDist;
                }
                
                joyNub.style.left = (moveOrigin.x + dx) + 'px';
                joyNub.style.top = (moveOrigin.y + dy) + 'px';
                
                moveVector.x = dx / maxDist;
                moveVector.y = dy / maxDist; // Positive is pulling back
            });

            zMove.addEventListener('pointerup', e => {
                if(e.pointerId === moveTouchId) {
                    moveTouchId = null;
                    moveVector = { x: 0, y: 0 };
                    joyBase.style.display = 'none';
                    joyNub.style.display = 'none';
                    zMove.releasePointerCapture(e.pointerId);
                }
            });

            zMove.addEventListener('pointercancel', e => {
                if(e.pointerId === moveTouchId) {
                    moveTouchId = null;
                    moveVector = { x: 0, y: 0 };
                    joyBase.style.display = 'none';
                    joyNub.style.display = 'none';
                }
            });

            // Look
            zLook.addEventListener('pointerdown', e => {
                if(lookTouchId !== null) return;
                lookTouchId = e.pointerId;
                lookLast = { x: e.clientX, y: e.clientY };
                zLook.setPointerCapture(e.pointerId);
            });

            zLook.addEventListener('pointermove', e => {
                if(e.pointerId !== lookTouchId) return;
                const dx = e.clientX - lookLast.x;
                const dy = e.clientY - lookLast.y;
                lookLast = { x: e.clientX, y: e.clientY };

                const sensitivity = 0.006;
                yaw -= dx * sensitivity;
                pitch -= dy * sensitivity;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            });

            zLook.addEventListener('pointerup', e => {
                if(e.pointerId === lookTouchId) {
                    lookTouchId = null;
                    zLook.releasePointerCapture(e.pointerId);
                }
            });
            zLook.addEventListener('pointercancel', e => {
                if(e.pointerId === lookTouchId) lookTouchId = null;
            });
        }

        // Camera remains strictly attached to first person perspective group

        // ==========================================
        // GAME LOGIC
        // ==========================================

        function checkCollision(newX, newZ) {
            const points = [
                {x: newX - PLAYER_SIZE, z: newZ - PLAYER_SIZE},
                {x: newX + PLAYER_SIZE, z: newZ - PLAYER_SIZE},
                {x: newX - PLAYER_SIZE, z: newZ + PLAYER_SIZE},
                {x: newX + PLAYER_SIZE, z: newZ + PLAYER_SIZE}
            ];

            for (let p of points) {
                const gx = Math.round(p.x);
                const gz = Math.round(p.z);
                
                if (getCell(gx, gz) === 'W') return true;
            }
            return false;
        }

        function updatePlayerMovement(delta) {
            playerGroup.rotation.y = yaw;
            camera.rotation.x = pitch;

            if (moveVector.x === 0 && moveVector.y === 0) {
                walkTime = 0;
                return;
            }

            walkTime += delta;
            const speed = appState.config.playerSpeed;
            const dist = speed * delta;

            const dirX = -Math.sin(yaw);
            const dirZ = -Math.cos(yaw);
            const rightX = Math.cos(yaw);
            const rightZ = -Math.sin(yaw);

            let dx = (dirX * -moveVector.y + rightX * moveVector.x) * dist;
            let dz = (dirZ * -moveVector.y + rightZ * moveVector.x) * dist;

            let targetX = playerGroup.position.x + dx;
            if (!checkCollision(targetX, playerGroup.position.z)) playerGroup.position.x = targetX;
            let targetZ = playerGroup.position.z + dz;
            if (!checkCollision(playerGroup.position.x, targetZ)) playerGroup.position.z = targetZ;

            updateDynamicWalls();

            // Head Bob
            camera.position.y = 0.5 + Math.sin(walkTime * 8) * 0.03;
            camera.position.x = Math.sin(walkTime * 4) * 0.02;
        }

        let scareTimer = 0;
        let ambientFlickerTime = 0;
        let shadowFigure = null;
        let shadowActive = false;

        function updateStalker(delta) {
            if (!stalkerEntity) return;

            if (!stalkerEntity.visible) {
                // Spawn stalker somewhere in the direction the player is NOT looking
                if (Math.random() < 0.015) {
                    const spawnAngle = yaw + Math.PI + (Math.random() - 0.5) * 1.5; 
                    const dist = 6 + Math.random() * 3;
                    const sx = playerGroup.position.x + Math.sin(spawnAngle) * dist;
                    const sz = playerGroup.position.z + Math.cos(spawnAngle) * dist;

                    const gx = Math.round(sx);
                    const gz = Math.round(sz);
                    if (getCell(gx, gz) === '.') {
                        stalkerEntity.position.set(sx, 0.4, sz);
                        stalkerEntity.visible = true;
                        stalkerTimer = 0;
                    }
                }
            } else {
                // Stalker creeps towards the player
                const dx = playerGroup.position.x - stalkerEntity.position.x;
                const dz = playerGroup.position.z - stalkerEntity.position.z;
                const dist = Math.hypot(dx, dz);
                
                if (dist > 0.1) {
                    stalkerEntity.position.x += (dx / dist) * delta * 1.2;
                    stalkerEntity.position.z += (dz / dist) * delta * 1.2;
                    stalkerEntity.rotation.y = Math.atan2(dx, dz);
                }

                // Check if in camera frustum
                const frustum = new THREE.Frustum();
                const projScreenMatrix = new THREE.Matrix4();
                projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
                frustum.setFromProjectionMatrix(projScreenMatrix);

                if (frustum.containsPoint(stalkerEntity.position)) {
                    stalkerTimer += delta;
                    if (stalkerTimer > 0.5) {
                        stalkerEntity.visible = false;
                    }
                }

                // If caught - DO NOT DIE, instead scare and reposition stalker
                if (dist < 0.7) {
                    stalkerEntity.visible = false;
                    playSound('sfx-lose', 'lose');
                    const noise = document.getElementById('glitch-noise');
                    if (noise) {
                        noise.style.opacity = '0.7';
                        setTimeout(() => { noise.style.opacity = '0'; }, 400);
                    }
                    sendMessage('gen_vibration', { duration: 300 }, false);
                }
            }
        }

        function triggerRandomAudioScare() {
            if (!audioCtx) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const rand = Math.random();
            const now = audioCtx.currentTime;
            
            if (rand < 0.33) {
                // Distant bang
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(70, now);
                osc.frequency.exponentialRampToValueAtTime(25, now + 1.5);
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(120, now);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                gain.gain.setValueAtTime(0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
                
                osc.start(now);
                osc.stop(now + 1.8);
            } else if (rand < 0.66) {
                // Metallic scrape / Whisper Sweep
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(750, now);
                osc.frequency.linearRampToValueAtTime(950, now + 0.4);
                
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.12, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                osc.start(now);
                osc.stop(now + 0.5);
            } else {
                // Sub-bass rumble
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(40, now);
                osc.frequency.setValueAtTime(36, now + 1.2);
                
                gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 0.6);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2.8);
                
                osc.start(now);
                osc.stop(now + 2.8);
            }
        }

        function spawnDistantShadow() {
            if (shadowFigure) scene.remove(shadowFigure);

            const geo = new THREE.CylinderGeometry(0.15, 0.2, 1.6, 6);
            const mat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.9 });
            shadowFigure = new THREE.Mesh(geo, mat);

            const angle = yaw + (Math.random() - 0.5) * 0.5; 
            const dist = 5;
            const sx = playerGroup.position.x - Math.sin(angle) * dist;
            const sz = playerGroup.position.z - Math.cos(angle) * dist;

            const gx = Math.round(sx);
            const gz = Math.round(sz);
            if (getCell(gx, gz) === '.') {
                shadowFigure.position.set(gx, 0.8, gz);
                scene.add(shadowFigure);
                shadowActive = true;
            }
        }

        function removeDistantShadow() {
            if (shadowFigure) {
                scene.remove(shadowFigure);
                shadowFigure = null;
            }
            shadowActive = false;
        }

        function attemptCorridorShift() {
            const px = Math.round(playerGroup.position.x);
            const pz = Math.round(playerGroup.position.z);
            
            const ox = (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 2) + 2);
            const oz = (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 2) + 2);
            
            const tx = px + ox;
            const tz = pz + oz;

            const testPoint = new THREE.Vector3(tx, 0.5, tz);
            const frustum = new THREE.Frustum();
            const projScreenMatrix = new THREE.Matrix4();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);
            
            if (!frustum.containsPoint(testPoint)) {
                const originalVal = getCell(tx, tz);
                const leftVal = getCell(tx - 1, tz);
                const rightVal = getCell(tx + 1, tz);
                
                if (originalVal === 'W' && (leftVal === '.' || rightVal === '.')) {
                    mutatedCells.set(`${tx},${tz}`, '.');
                } else if (originalVal === '.' && (leftVal === 'W' || rightVal === 'W')) {
                    mutatedCells.set(`${tx},${tz}`, 'W');
                }
                updateDynamicWalls(true);
            }
        }

        function updateMindfucks(delta) {
            if (appState.gameState !== 'playing') return;

            scareTimer += delta;
            const freqScale = appState.config.scareFrequency || 0.5;

            // 1. Audio scares
            if (scareTimer > (12 / freqScale)) {
                scareTimer = 0;
                triggerRandomAudioScare();
            }

            // 2. Flashlight flicker (very dim, short range)
            const flashlight = playerGroup.children.find(c => c.isSpotLight);
            if (flashlight) {
                ambientFlickerTime += delta;
                if (Math.random() < 0.015) {
                    flashlight.intensity = 0;
                } else if (Math.random() < 0.04) {
                    flashlight.intensity = 0.02 + Math.random() * 0.05;
                } else {
                    flashlight.intensity = 0.15;
                }

                if (stalkerEntity && stalkerEntity.visible) {
                    const dist = Math.hypot(stalkerEntity.position.x - playerGroup.position.x, stalkerEntity.position.z - playerGroup.position.z);
                    if (dist < 3) {
                        flashlight.intensity = Math.random() < 0.35 ? 0 : 0.03;
                    }
                }
            }

            // 3. Dynamic FOV Distortion (Warping reality)
            if (Math.random() < 0.0018 * freqScale) {
                gsap.to(camera, {
                    fov: 105,
                    duration: 0.3,
                    onUpdate: () => camera.updateProjectionMatrix(),
                    onComplete: () => {
                        gsap.to(camera, {
                            fov: 75,
                            duration: 1.8,
                            delay: 0.4,
                            onUpdate: () => camera.updateProjectionMatrix()
                        });
                    }
                });
            }

            // 4. Distant Shadow Spawning (More frequent shadows)
            if (!shadowActive && Math.random() < 0.02 * freqScale) {
                spawnDistantShadow();
            }
            if (shadowActive && shadowFigure) {
                const dist = Math.hypot(shadowFigure.position.x - playerGroup.position.x, shadowFigure.position.z - playerGroup.position.z);
                if (dist < 2.2) {
                    removeDistantShadow();
                }
                
                const frustum = new THREE.Frustum();
                const projScreenMatrix = new THREE.Matrix4();
                projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
                frustum.setFromProjectionMatrix(projScreenMatrix);
                if (frustum.containsPoint(shadowFigure.position)) {
                    shadowFigure.scale.y -= delta * 2;
                    if (shadowFigure.scale.y <= 0) {
                        removeDistantShadow();
                    }
                }
            }

            // 5. Corridors Shifting (Looking away swaps walls - Rarer)
            if (Math.random() < 0.0015 * freqScale) {
                attemptCorridorShift();
            }
        }

        let videoTriggered = false;
        function triggerVideoCutscene() {
            if (videoTriggered) return;
            videoTriggered = true;
            appState.gameState = 'video';
            
            const bgm = document.getElementById('music-bgm');
            if (bgm) bgm.pause();
            
            const video = document.getElementById('scare-video');
            video.style.display = 'block';
            
            video.play().catch(err => {
                console.log("Video playback blocked, attempting muted", err);
                video.muted = true;
                video.play().catch(e => console.error("Muted video play failed", e));
            });
            
            video.addEventListener('ended', () => {
                video.style.display = 'none';
                const vhs = document.getElementById('vhs-screen');
                vhs.style.display = 'flex';
                sendMessage('gen_vibration', { duration: 1000 }, false);
            });
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            if (appState.gameState === 'video') {
                return;
            }
            
            if (appState.gameState !== 'playing') {
                renderer.render(scene, camera);
                return;
            }

            const delta = Math.min(clock.getDelta(), 0.1);

            // Check if played for more than 1:30 (90 seconds)
            if (Date.now() - appState.startTime > 90000) {
                triggerVideoCutscene();
                return;
            }

            updatePlayerMovement(delta);
            updateStalker(delta);
            updateMindfucks(delta);

            renderer.render(scene, camera);
        }

        // SYSTEM CONTROLS
        // ==========================================

        function startGame() {
            appState.gameState = 'playing';
            appState.startTime = Date.now();
            clock.start();
        }

        function triggerEnd(win) {
            appState.gameState = 'lost';
            appState.scoreTime = Math.round((Date.now() - appState.startTime) / 1000);
            
            // Play glitch sounds and activate screen overlay
            playSound('sfx-lose', 'lose');
            sendMessage('gen_vibration', { duration: 400 }, false);

            const glitchOverlay = document.getElementById('glitch-overlay');
            const glitchNoise = document.getElementById('glitch-noise');
            const glitchText = document.getElementById('glitch-text');

            glitchOverlay.classList.remove('pointer-events-none');
            glitchOverlay.classList.add('bg-black/95');
            glitchNoise.style.opacity = '0.5';
            glitchText.style.opacity = '1';

            setTimeout(() => {
                // Clear glitch visuals
                glitchOverlay.classList.remove('bg-black/95');
                glitchOverlay.classList.add('pointer-events-none');
                glitchNoise.style.opacity = '0';
                glitchText.style.opacity = '0';

                // Display custom Wake Up screen
                document.getElementById('result-title').textContent = getConfig('text', 'loseTitle') || 'LOOP RESET';
                document.getElementById('result-subtitle').textContent = `The hallways mutated. The cycle restarts.`;
                document.getElementById('result-time').textContent = `${appState.scoreTime}s`;
                document.getElementById('result-screen').classList.add('visible');
            }, 1800);
        }

        function resetGame() {
            document.getElementById('result-screen').classList.remove('visible');
            
            // Reset state & clear mutated cell coordinates
            appState.startTime = Date.now();
            scareTimer = 0;
            mutatedCells.clear();
            
            // Reset Camera
            yaw = 0; pitch = 0;
            
            // Reposition playerGroup
            playerGroup.position.set(0, 0, 0);

            if (shadowFigure) {
                scene.remove(shadowFigure);
                shadowFigure = null;
            }
            shadowActive = false;

            if (stalkerEntity) {
                stalkerEntity.visible = false;
            }

            // Rebuild levels dynamically
            updateDynamicWalls(true);

            appState.gameState = 'playing';
            clock.start();
        }

        // ==========================================
        // AUDIO SYSTEM
        // ==========================================
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const audioCtx = AudioContextClass ? new AudioContextClass() : null;
        
        function initBGM() {
            const el = document.getElementById('music-bgm');
            if (!el?.src) return;
            el.loop = true;
            el.volume = 0.5;
            const playBgm = () => {
                el.play().catch(() => {
                    document.addEventListener('touchstart', playBgm, { once: true });
                    document.addEventListener('click', playBgm, { once: true });
                });
            };
            playBgm();
        }

        function playSound(domId, synthType) {
            const el = document.getElementById(domId);
            if (el?.src) {
                el.currentTime = 0;
                el.play().catch(()=>{});
                return;
            }
            
            // Procedural Fallback
            if (!audioCtx) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (synthType === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, now);
                osc.frequency.linearRampToValueAtTime(30, now + 1.2);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.linearRampToValueAtTime(0, now + 1.2);
                osc.start(now); osc.stop(now + 1.2);
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        async function initApp() {
            applyAllEditableValues();
            initBGM(); 
            
            initThreeJS();
            initControls();

            // Copy Code functionality
            const btnCopy = document.getElementById('btn-copy-code');
            if (btnCopy) {
                btnCopy.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    try {
                        // Create a temporary DOM to clean and remove the copy button itself
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(document.documentElement.outerHTML, 'text/html');
                        const copyBtnInDoc = doc.getElementById('btn-copy-code');
                        if (copyBtnInDoc) {
                            copyBtnInDoc.remove();
                        }
                        const htmlCode = doc.documentElement.outerHTML;
                        await navigator.clipboard.writeText(htmlCode);
                        btnCopy.textContent = "COPIED TO CLIPBOARD";
                        btnCopy.style.borderColor = "rgba(0, 255, 0, 0.4)";
                        btnCopy.style.color = "rgba(0, 255, 0, 0.7)";
                        setTimeout(() => {
                            btnCopy.textContent = "COPY SEQUENCE CODE";
                            btnCopy.style.borderColor = "rgba(255, 255, 255, 0.15)";
                            btnCopy.style.color = "rgba(255, 255, 255, 0.4)";
                        }, 2000);
                    } catch (err) {
                        console.error("Failed to copy code", err);
                        btnCopy.textContent = "COPY FAILED";
                        setTimeout(() => {
                            btnCopy.textContent = "COPY SEQUENCE CODE";
                        }, 2000);
                    }
                });
            }

            // Direct start
            setTimeout(startGame, 100);
            
            document.getElementById('btn-retry').addEventListener('click', resetGame);
            
            document.getElementById('btn-share').addEventListener('click', async (e) => {
                const btn = e.currentTarget;
                if(btn.dataset.loading === 'true') return;
                btn.dataset.loading = 'true';
                btn.disabled = true;
                const origText = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sharing...';
                
                try {
                    const zone = document.getElementById('share-zone');
                    const jpgImg = await window.snapdom.toJpg(zone, { quality: 0.8, width: zone.offsetWidth * 2, height: zone.offsetHeight * 2 });
                    
                    const title = `I survived the shifting labyrinth loop for ${appState.scoreTime}s before losing my mind.`;
                        
                    sendMessage('invoke_share', { title, coverImageBase64: jpgImg.src }, false);
                } catch(err) {
                    console.error('Share failed', err);
                } finally {
                    btn.dataset.loading = 'false';
                    btn.disabled = false;
                    btn.innerHTML = origText;
                }
            });

            gameLoop();
        }

        document.addEventListener('DOMContentLoaded', initApp);

        // ==========================================
        // PREVIEW EDITING API
        // ==========================================
        (function setupPreviewEditingAPI() {
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg?.origin !== 'sekai_gaming_iframe_api') return;

                switch (msg.type) {
                    case 'get_editable_metadata':
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_editable_metadata',
                            taskId: msg.taskId,
                            data: window.sekaiEditable || {}
                        }, '*');
                        break;
                    case 'apply_change':
                        const success = applySingleChange(msg.data.id, msg.data.value, msg.data.name, msg.data.description);
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_apply_change',
                            taskId: msg.taskId,
                            data: { success }
                        }, '*');
                        break;
                    case 'get_current_html':
                        window.parent.postMessage({
                            origin: 'sekai_gaming_iframe_api',
                            type: 'receive_current_html',
                            taskId: msg.taskId,
                            data: { html: document.documentElement.outerHTML }
                        }, '*');
                        break;
                    case 'reset_changes':
                        location.reload();
                        break;
                }
            });

            function applySingleChange(id, value, name, description) {
                const categories = ['tune', 'images', 'videos', 'music', 'sfx', 'colors', 'text', 'prompts', 'voices'];
                for (const cat of categories) {
                    const item = window.sekaiEditable[cat]?.find(i => i.id === id);
                    if (!item) continue;

                    item.value = value;
                    if (name) item.name = name;
                    if (description) item.description = description;

                    if (item.cssVar) {
                        document.documentElement.style.setProperty(item.cssVar, value);
                    } else if (item.path) {
                        setNestedValue(window, item.path, value);
                    } else if (item.selector) {
                        const el = document.querySelector(item.selector);
                        if (!el) return false;

                        if (el.tagName === 'AUDIO' || el.tagName === 'VIDEO') {
                            const wasPlaying = !el.paused;
                            el.src = value;
                            el.load();
                            if (wasPlaying) el.play().catch(() => {});
                        } else if (item.type === 'text') {
                            el.textContent = value;
                        } else {
                            if(item.property === 'src') el.src = value;
                            else if (item.property === 'backgroundImage') el.style.backgroundImage = `url('${value}')`;
                        }
                    } else if (cat === 'images' && scene) {
                        // Rebuild map materials if texture changed
                        const tex = new THREE.TextureLoader().load(value);
                        tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
                        
                        if(id === 'texWall' && wallMesh) {
                            wallMesh.material.map = tex;
                            wallMesh.material.needsUpdate = true;
                        } else if (id === 'texFloor') {
                            tex.repeat.set(VIEW_RADIUS * 3, VIEW_RADIUS * 3);
                            if(floorMesh) { floorMesh.material.map = tex; floorMesh.material.needsUpdate = true; }
                            if(ceilingMesh) { ceilingMesh.material.map = tex; ceilingMesh.material.needsUpdate = true; }
                        }
                    }
                    return true;
                }
                return false;
            }
        })();

    </script>
